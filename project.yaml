version: '4.0'

actions:

  # action which creates a dataset using ehrQL, this is just for getting numbers of patients being
  # included/excluded, this is not going to be tested and will use ehrQL generated dummy data
  generate_population:
    run: >
      ehrql:v1 generate-dataset
      analysis/inclusion_definition.py
      --output output/population.arrow
    outputs:
      highly_sensitive:
        dataset: output/population.arrow

  # action which will agreggate and summarise the data from generate_population
  process_population:
    run: r:v2 analysis/inclusion_processing.R
    needs:
    - generate_population
    outputs:
      moderately_sensitive:
        dataset: output/population_processed.csv

  # action which creates dataset using ehrQL, will use user provided dummy tables from 'dummy_tables' folder
  # will also test the dataset definition automatically
  generate_dataset:
    run: >
        ehrql:v1 generate-dataset
        analysis/dataset_definition.py
        --test-data-file analysis/test_dataset_definition.py
        --dummy-tables dummy_tables
        --output output/dataset.arrow
    outputs:
      highly_sensitive:
        population: output/dataset.arrow

  # action which will process the dataset from generate_dataset, so data is formatted as desired
  process_dataset:
    run: r:v2 analysis/data_processing.R
    needs:
    - generate_dataset
    outputs:
      highly_sensitive:
        dataset: output/dataset_processed.arrow

  # action which will provide sense checks for the data - not intended for release
  check_dataset:
    run: r:v2 analysis/sense_checks/internal_checks.R
    needs:
    - process_dataset
    outputs:
      moderately_sensitive:
        categorical: output/sense_checks/categorical_checks.csv
        continuous: output/sense_checks/*_hist.png
        dates: output/sense_checks/date_checks.csv
        missing: output/sense_checks/missing_values.csv

  # action which will aggregate the study population information to create a classic table 1
  summarise_dataset:
    run: r:v2 analysis/table1.R
    needs:
    - process_dataset
    outputs:
      moderately_sensitive:
        table: output/table1.csv

  # action which will run a linear regression model, tidy the results and save it as a csv
  analyse_dataset:
    run: r:v2 analysis/model.R
    needs:
    - process_dataset
    outputs:
      moderately_sensitive:
        model: output/model_results.csv

  # action which creates a series of measures across conditions and age groups
  generate_measures:
    run: >
        ehrql:v1 generate-measures
        analysis/measures_definition.py
        --dummy-tables dummy_tables
        --output output/measures/:csv
    outputs:
      moderately_sensitive:
        dataset: output/measures/measure_*.csv

#  # action which generates plots of measures across conditions and age groups
#  # this is an action you could use if visualisation was wanted to be in the secure server
#  visualise_measures:
#    run: r:v2 analysis/measures_visualisation.R
#    needs:
#    - generate_measures
#    outputs:
#      moderately_sensitive:
#        png: output/measures/measures_by_*.png

  # action which creates decile charts for measures
  create_deciles_charts:
    run: >
      python:v1 analysis/deciles_charts.py
        --input-files output/measures/measure_*_monthly.csv
        --output-dir output/measures
    config:
      show_outer_percentiles: false
      tables:
        output: true
      charts:
        output: true
    needs: 
    - generate_measures
    outputs:
      moderately_sensitive:
        deciles_tables: output/measures/deciles_*_*.csv
        deciles_charts: output/measures/deciles_*_*.png
