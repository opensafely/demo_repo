version: '4.0'

actions:

  # action which creates dataset using ehrQL, will use user provided dummy tables from 'dummy_tables' folder
  # will also test the dataset definition automatically
  generate_dataset:
    run: >
        ehrql:v1 generate-dataset
        analysis/dataset_definition.py
        --test-data-file analysis/test_dataset_definition.py
        --dummy-tables dummy_tables
        --output output/dataset.arrow
    outputs:
      highly_sensitive:
        population: output/dataset.arrow

  # action which will process the dataset from generate_dataset, so data is formatted as desired
  process_dataset:
    run: r:latest analysis/data_processing.R
    needs:
    - generate_dataset
    outputs:
      highly_sensitive:
        dataset: output/dataset_processed.arrow

  # action which creates some additional population visualisations
  create_population_vis:
    run: r:latest analysis/study_pop_vis.R 
    needs:
    - process_dataset
    outputs:
      moderately_sensitive:

  # action which creates a series of measures across conditions and age groups
  generate_measures:
    run: >
        ehrql:v1 generate-measures
        analysis/measures_definition.py
        --dummy-tables dummy_tables
        --output output/measures/:csv
    outputs:
      moderately_sensitive:
        dataset: output/measures/measure_*.csv

  # action which generates plots of measures across conditions and age groups
  visualise_measures:
    run: r:latest analysis/measures_visualisation.R
    needs:
    - generate_measures
    outputs:
      moderately_sensitive:
        png: output/measures/measures_by_*.png

  # action which creates decile charts for measures
  create_deciles_charts:
    run: >
      python:latest analysis/deciles_charts.py
        --input-files output/measures/measure_*_monthly.csv
        --output-dir output/measures
    config:
      show_outer_percentiles: false
      tables:
        output: true
      charts:
        output: true
    needs: 
    - generate_measures
    outputs:
      moderately_sensitive:
        deciles_tables: output/measures/deciles_*_*.csv
        deciles_charts: output/measures/deciles_*_*.png
