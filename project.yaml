version: '4.0'

actions:

  # action which creates dataset using ehrQL, will use ehrQL generated dummy data
  # will also test the dataset definition automatically
  generate_dataset:
    run: >
        ehrql:v1 generate-dataset
        analysis/dataset_definition.py
        --test-data-file analysis/test_dataset_definition.py
        --output output/dataset.arrow
    outputs:
      highly_sensitive:
        population: output/dataset.arrow

  # action which will process the dataset from generate_dataset, so data is formatted as desired
  process_dataset:
    run: r:latest analysis/data_processing.R
    needs:
    - generate_dataset
    outputs:
      highly_sensitive:
        dataset: output/dataset_processed.arrow

  # action which creates yearly measure across conditions of interest, i.e., asthma and COPD
  generate_measures_conditions:
    run: >
        ehrql:v1 generate-measures
        analysis/demo_measures_definition_conditions.py
        --output output/demo_measures_conditions.csv
    outputs:
      moderately_sensitive:
        dataset: output/demo_measures_conditions.csv

  # action which creates monthly measure across conditions of interest, i.e., asthma and COPD
  generate_measures_conditions_monthly:
    run: >
        ehrql:v1 generate-measures
        analysis/demo_measures_definition_conditions_monthly.py
        --output output/demo_measures_conditions_monthly.csv
    outputs:
      moderately_sensitive:
        dataset: output/demo_measures_conditions_monthly.csv
  
  # action which generates plots of measure across conditions of interest, i.e., asthma and COPD
  visualise_measures_conditions:
    run: r:latest analysis/measures_vis_conditions.R
    needs:
    - generate_measures_conditions
    - generate_measures_conditions_monthly
    outputs:
      moderately_sensitive:
        png_y: output/measures/measures_by_conditions.png
        png_m: output/measures/measures_by_conditions_monthly.png

  # action which creates yearly measure across age groups, i.e., 12-17, 18-64, 65+
  generate_measures_ages:
    run: >
        ehrql:v1 generate-measures
        analysis/demo_measures_definition_ages.py
        --output output/demo_measures_ages.csv
    outputs:
      moderately_sensitive:
        dataset: output/demo_measures_ages.csv

  # action which creates monthly measure across age groups, i.e., 12-17, 18-64, 65+
  generate_measures_ages_monthly:
    run: >
        ehrql:v1 generate-measures
        analysis/demo_measures_definition_ages_monthly.py
        --output output/demo_measures_ages_monthly.csv
    outputs:
      moderately_sensitive:
        dataset: output/demo_measures_ages_monthly.csv

  # action which generates plots of measure across age groups, i.e., 12-17, 18-64, 65+
  visualise_measures_ages:
    run: r:latest analysis/measures_vis_ages.R
    needs:
    - generate_measures_ages
    - generate_measures_ages_monthly
    outputs:
      moderately_sensitive:
        png_y: output/measures/measures_by_age_groups.png
        png_m: output/measures/measures_by_age_groups_monthly.png
